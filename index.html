<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Package Sorting Game - v1.0.0 (Refactored)</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      overflow: hidden;
    }

    #game-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Loading overlay */
    #loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      transition: opacity 0.5s ease;
    }

    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-text {
      color: #ffffff;
      font-size: 24px;
      font-weight: 300;
      letter-spacing: 2px;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* Info panel */
    #info-panel {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: #666;
      font-size: 12px;
      text-align: center;
      pointer-events: none;
    }

    #info-panel kbd {
      background-color: #333;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: monospace;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <!-- Loading overlay -->
    <div id="loading-overlay">
      <div class="loading-text">LOADING...</div>
    </div>
  </div>

  <div id="info-panel">
    Package Sorting Game v1.0.0 (Refactored) | Click packages to select, click vehicles to assign
  </div>

  <!-- Phaser library from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>

  <!-- Game modules - using ES modules -->
  <script type="importmap">
  {
    "imports": {
      "@config/": "./src/config/",
      "@utils/": "./src/utils/",
      "@state/": "./src/state/",
      "@entities/": "./src/entities/",
      "@systems/": "./src/systems/",
      "@ui/": "./src/ui/",
      "@scenes/": "./src/scenes/"
    }
  }
  </script>

  <!-- Main game script -->
  <script type="module">
    // Import game modules
    import { game, gameConfig } from './src/main.js';

    // Hide loading overlay when game is ready
    game.events.once('ready', () => {
      const overlay = document.getElementById('loading-overlay');
      if (overlay) {
        overlay.classList.add('hidden');
        setTimeout(() => overlay.remove(), 500);
      }
    });

    // Handle game errors
    game.events.on('hidden', () => {
      console.log('Game hidden');
    });

    game.events.on('visible', () => {
      console.log('Game visible');
    });
  </script>
</body>
</html>
